{% extends "base.html" %}

{% block title %}MTA · {{ config.title }}{% endblock title %}
{% block description %}<meta name="description" content="Real-time NYC subway arrivals near you." />{% endblock description %}

{% block head %}
<link rel="icon" type="image/png" href="{{ get_url(path='mta.png') | safe }}" />
<link rel="preconnect" href="https://api-endpoint.mta.info" />
<script defer src="{{ get_url(path='trains.js') | safe }}"></script>
{% endblock head %}

{% block body %}
<main class="page">
  <div class="toolbar">
    <button class="btn btn--grow" onclick="refreshTrainTimes()" type="button">Refresh</button>
    <button class="btn btn--icon" onclick="refreshLocation()" type="button" aria-label="Update location">◎</button>
  </div>
  <div id="content"></div>
</main>
{% endblock body %}
