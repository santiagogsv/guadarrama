<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <title>{% block title %}{% if page %}{{ page.title }}{% elif section %}{{ section.title }}{% endif %} · {{
    config.title }}{% endblock title %}</title>
  {% block description %}
  <meta name="description" content="{{ config.description }}" />{% endblock description %}
  <link rel="stylesheet" href="{{ get_url(path='site.css') | safe }}" />
  {% block head %}{% endblock head %}
  <script>
    document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive: false });
  </script>
</head>

<body>
  <header class="site-header">
    <div class="site-header__inner">
      <nav class="nav" aria-label="Site">
        <a href="{{ get_url(path='/') | safe }}" {% if current_path=="/" or current_path is starting_with("/weather") %}
          aria-current="page" {% endif %}>Home</a>
        <a href="{{ get_url(path='markdown/') | safe }}" {% if current_path is starting_with("/markdown") %}
          aria-current="page" {% endif %}>Markdown</a>
      </nav>
      <button class="btn btn--icon btn--ghost geo-btn" onclick="refreshLocation()" type="button"
        aria-label="Update location" title="Update location">📍</button>
    </div>
  </header>
  {% block body %}{% endblock body %}
</body>

</html>
