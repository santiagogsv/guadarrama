<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{% if page %}{{ page.title }}{% elif section %}{{ section.title }}{% endif %} · {{ config.title }}{% endblock title %}</title>
  {% block description %}<meta name="description" content="{{ config.description }}" />{% endblock description %}
  <link rel="stylesheet" href="{{ get_url(path='site.css') | safe }}" />
  {% block head %}{% endblock head %}
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Site">
      <a href="{{ get_url(path='/') | safe }}"{% if current_path == "/" %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ get_url(path='weather/') | safe }}"{% if current_path is starting_with("/weather") %} aria-current="page"{% endif %}>Weather</a>
      <a href="{{ get_url(path='mta/') | safe }}"{% if current_path is starting_with("/mta") %} aria-current="page"{% endif %}>MTA</a>
      <a href="{{ get_url(path='markdown/') | safe }}"{% if current_path is starting_with("/markdown") %} aria-current="page"{% endif %}>Markdown</a>
    </nav>
  </header>
  {% block body %}{% endblock body %}
</body>
</html>
